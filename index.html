<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cysic Worker Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d0d0d; color: #f0f0f0; min-height: 100vh; padding: 2rem 1rem; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; }
  .search-row { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .search-row input {
    flex: 1; min-width: 280px; padding: 10px 14px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    color: #f0f0f0; font-size: 14px; outline: none;
  }
  .search-row input:focus { border-color: #6c63ff; }
  .search-row button {
    padding: 10px 20px; background: #6c63ff; border: none;
    border-radius: 8px; color: #fff; font-size: 14px;
    cursor: pointer; white-space: nowrap;
  }
  .search-row button:hover { background: #574fd6; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1rem 1.2rem; }
  .card .label { font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 22px; font-weight: 600; color: #fff; }
  .card .sub { font-size: 12px; color: #666; margin-top: 4px; }
  .section-title { font-size: 14px; font-weight: 600; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: #888; font-weight: 500; border-bottom: 1px solid #2a2a2a; }
  td { padding: 9px 12px; border-bottom: 1px solid #1e1e1e; color: #ddd; }
  tr:last-child td { border-bottom: none; }
  td a { color: #6c63ff; text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-in { background: #1a3a1a; color: #4caf50; }
  .badge-out { background: #3a1a1a; color: #f44336; }
  .status { margin: 1rem 0; padding: 12px 16px; background: #1a1a1a; border-radius: 8px; font-size: 14px; color: #aaa; }
  .status.error { border-left: 3px solid #f44336; color: #f88; }
  .status.loading { border-left: 3px solid #6c63ff; }
  .status.success { border-left: 3px solid #4caf50; }
  .section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1.2rem; margin-bottom: 1.2rem; overflow-x: auto; }
  .addr-display { font-size: 12px; color: #666; margin-bottom: 1.5rem; word-break: break-all; }
  .cys { color: #6c63ff; font-weight: 600; }
</style>
</head>
<body>

<h1>⚡ Cysic Worker Dashboard</h1>

<div class="search-row">
  <input type="text" id="addrInput" placeholder="Enter worker address: 0x..." value="" />
  <button onclick="loadData()">Load</button>
</div>

<div id="status" class="status" style="display:none"></div>

<div id="output" style="display:none">
  <p class="addr-display" id="addrDisplay"></p>

  <div class="cards">
    <div class="card">
      <div class="label">CYS Balance</div>
      <div class="value cys" id="balance">—</div>
      <div class="sub">Native token</div>
    </div>
    <div class="card">
      <div class="label">Total Transactions</div>
      <div class="value" id="txCount">—</div>
      <div class="sub">All time</div>
    </div>
    <div class="card">
      <div class="label">Tokens Received</div>
      <div class="value" id="tokensIn">—</div>
      <div class="sub">Inbound CYS</div>
    </div>
    <div class="card">
      <div class="label">Last Active</div>
      <div class="value" id="lastActive" style="font-size:14px; padding-top:4px">—</div>
      <div class="sub">Last tx date</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent Transactions</div>
    <table>
      <thead>
        <tr>
          <th>Hash</th>
          <th>Type</th>
          <th>Value (CYS)</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="txTable"></tbody>
    </table>
  </div>
</div>

<script>
const BASE = 'https://explorer-evm.cysic.xyz/api/v2';
const WEI = 1e18;

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

function shortHash(h) {
  return h ? h.slice(0, 8) + '...' + h.slice(-6) : '—';
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatVal(val) {
  const n = parseFloat(val) / WEI;
  if (isNaN(n)) return '0';
  return n.toLocaleString('en', { maximumFractionDigits: 2 });
}

async function loadData() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr || !addr.startsWith('0x')) {
    setStatus('Please enter a valid address starting with 0x', 'error');
    return;
  }

  document.getElementById('output').style.display = 'none';
  setStatus('Loading data from Cysic network...', 'loading');

  try {
    const [addrRes, txRes] = await Promise.all([
      fetch(`${BASE}/addresses/${addr}`),
      fetch(`${BASE}/addresses/${addr}/transactions?limit=20`)
    ]);

    if (!addrRes.ok) throw new Error('Address not found or network error');

    const addrData = await addrRes.json();
    const txData = txRes.ok ? await txRes.json() : { items: [] };
    const txs = txData.items || [];

    document.getElementById('addrDisplay').textContent = addr;
    document.getElementById('balance').textContent = formatVal(addrData.coin_balance || '0') + ' CYS';
    document.getElementById('txCount').textContent = (addrData.transactions_count || 0).toLocaleString();

    let totalIn = 0;
    let lastDate = null;

    const tbody = document.getElementById('txTable');
    tbody.innerHTML = '';

    txs.forEach(tx => {
      const isIn = tx.to?.hash?.toLowerCase() === addr.toLowerCase();
      const val = parseFloat(tx.value || '0') / WEI;
      if (isIn) totalIn += val;

      if (!lastDate && tx.timestamp) lastDate = tx.timestamp;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><a href="https://explorer-evm.cysic.xyz/tx/${tx.hash}" target="_blank">${shortHash(tx.hash)}</a></td>
        <td><span class="badge ${isIn ? 'badge-in' : 'badge-out'}">${isIn ? 'IN' : 'OUT'}</span></td>
        <td>${val.toLocaleString('en', { maximumFractionDigits: 4 })}</td>
        <td>${formatDate(tx.timestamp)}</td>
        <td>${tx.status === 'ok' ? '✓' : '✗'}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('tokensIn').textContent = totalIn.toLocaleString('en', { maximumFractionDigits: 2 }) + ' CYS';
    document.getElementById('lastActive').textContent = formatDate(lastDate);

    if (txs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:#666; text-align:center; padding:20px">No transactions found</td></tr>';
    }

    setStatus('Data loaded successfully from Cysic Mainnet', 'success');
    document.getElementById('output').style.display = 'block';

  } catch (err) {
    setStatus('Error: ' + err.message + ' — Make sure the address is on Cysic Mainnet', 'error');
  }
}

window.onload = () => {
  const saved = localStorage.getItem('cysic_addr');
  if (saved) document.getElementById('addrInput').value = saved;
  document.getElementById('addrInput').addEventListener('change', e => {
    localStorage.setItem('cysic_addr', e.target.value);
  });
};
</script>
</body>
</html>
